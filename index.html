<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashspeed Elite</title>
    <!-- Use the latest Socket.io Library -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root { --bg: #050510; --panel: #111125; --neon: #00f2ff; --green: #39ff14; --red: #ff0055; --text: #fff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; text-align: center; }
        .hidden { display: none !important; }
        .login-box { background: var(--panel); padding: 40px; border: 2px solid var(--neon); border-radius: 20px; width: 300px; margin: 100px auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--neon); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #game-screen { display: none; padding: 20px; }
        #multiplier { font-size: 5rem; font-weight: 900; margin: 40px 0; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1 style="color:var(--neon)">FLASHSPEED</h1>
        <div id="conn-status" style="font-size:0.7rem; color:orange; margin-bottom:10px;">Connecting to server...</div>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="login()">LOGIN</button>
        <p style="font-size:0.8rem; color:#888;">Contact: 00923426693085</p>
    </div>
</div>

<div id="game-screen">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <div id="u-display" style="color:var(--neon)">USER</div>
        <div style="color:var(--green)">$ <span id="balance">0.00</span></div>
    </div>
    <div id="multiplier">1.00x</div>
    <button class="btn" style="background:var(--green); height:80px; font-size:1.5rem;" onclick="placeBet()">BET</button>
</div>

<script>
    // 1. Connect with specific settings for Render
    const socket = io("https://flashspeed-backend.onrender.com", {
        transports: ["websocket"]
    });

    const connStatus = document.getElementById('conn-status');

    // 2. Connection Debugging
    socket.on('connect', () => {
        connStatus.innerText = "Connected! ✅";
        connStatus.style.color = "#39ff14";
    });

    socket.on('connect_error', (err) => {
        connStatus.innerText = "Connection Error! ❌";
        connStatus.style.color = "red";
    });

    // 3. Login Logic
    function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(!u || !p) return alert("Enter details");
        
        console.log("Attempting login...");
        socket.emit('login', { u: u, p: p });
    }

    socket.on('login_success', (data) => {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('u-display').innerText = data.u;
        document.getElementById('balance').innerText = data.balance.toFixed(2);
    });

    socket.on('login_error', (msg) => {
        alert(msg);
    });

    socket.on('tick', (m) => {
        document.getElementById('multiplier').innerText = m + "x";
    });

    socket.on('update_balance', (b) => {
        document.getElementById('balance').innerText = b.toFixed(2);
    });
</script>
</body>
</html>
