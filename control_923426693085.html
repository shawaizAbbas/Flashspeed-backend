<!-- Inside your admin.html script tag -->
<script>
    // Change your connection line to this:
    const socket = io("https://flashspeed-backend.onrender.com", {
        transports: ["websocket"]
    });

    socket.on('connect', () => {
        console.log("Admin Connected to Server");
    });

    function addUser() {
        const u = document.getElementById('nu').value;
        const p = document.getElementById('np').value;
        if(!u || !p) return alert("Fill all fields");
        socket.emit('admin_create_user', { u: u, p: p });
        alert("Account creation signal sent!");
    }
</script>
