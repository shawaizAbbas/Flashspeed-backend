<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashspeed Control</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { background: #050510; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #111125; padding: 20px; border-radius: 15px; border: 1px solid #444; margin-bottom: 20px; text-align: left; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00f2ff; border: none; font-weight: bold; cursor: pointer; color: #000; }
        .user-row { background: #000; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 5px solid #39ff14; }
        #status-bar { padding: 5px; font-size: 0.8rem; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h1 style="color: #00f2ff;">CONTROL CENTER</h1>
    <div id="status-bar" style="background: orange; color: black;">WAITING FOR SERVER...</div>

    <div class="card">
        <h3>Create New User</h3>
        <input type="text" id="nu" placeholder="Username">
        <input type="text" id="np" placeholder="Password">
        <button onclick="addUser()">CREATE USER</button>
    </div>

    <div class="card">
        <h3>User List</h3>
        <div id="ulist">Loading users...</div>
    </div>

    <script>
        // CRITICAL FIX: No URL needed, it finds itself!
        const socket = io();

        const status = document.getElementById('status-bar');

        socket.on('connect', () => {
            status.innerText = "CONNECTED TO BRAIN ✅";
            status.style.background = "#39ff14";
            socket.emit('admin_get_users');
        });

        socket.on('disconnect', () => {
            status.innerText = "LOST CONNECTION ❌";
            status.style.background = "red";
        });

        function addUser() {
            const u = document.getElementById('nu').value;
            const p = document.getElementById('np').value;
            if(!u || !p) return alert("Fill fields");
            socket.emit('admin_create_user', { u: u, p: p });
            document.getElementById('nu').value = "";
            document.getElementById('np').value = "";
        }

        function setBalance(u) {
            const amt = prompt("New balance for " + u);
            if(amt !== null) socket.emit('admin_set_balance', { u: u, amt: amt });
        }

        socket.on('admin_user_list', (users) => {
            const list = document.getElementById('ulist');
            list.innerHTML = "";
            if(!users || users.length === 0) { list.innerHTML = "No users found."; return; }
            users.forEach(u => {
                list.innerHTML += `
                    <div class="user-row">
                        <b>${u.username.toUpperCase()}</b><br>
                        Balance: <span style="color:#39ff14">$${u.balance.toFixed(2)}</span><br>
                        <button style="width:auto; padding:5px 10px; margin-top:5px; background:#39ff14;" onclick="setBalance('${u.username}')">EDIT MONEY</button>
                    </div>`;
            });
        });
    </script>
</body>
</html>
