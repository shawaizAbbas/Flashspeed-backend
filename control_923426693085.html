<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { background: #050510; color: white; font-family: sans-serif; padding: 15px; }
        .card { background: #111125; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin: 8px 0; background: #000; border: 1px solid #444; color: #fff; }
        button { padding: 10px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin: 2px; }
        .btn-crash { background: #ff0055; width: 100%; font-size: 1.5rem; color: white; height: 70px; margin-bottom: 15px; }
        .user-row { background: #000; padding: 12px; margin: 10px 0; border-left: 4px solid #00f2ff; border-radius: 5px; }
        .bet-row { color: #39ff14; font-size: 0.9rem; border-bottom: 1px solid #222; padding: 5px 0; }
    </style>
</head>
<body>
    <h2 style="color:#00f2ff; text-align:center;">FLASH MASTER PANEL</h2>
    <button class="btn-crash" onclick="socket.emit('admin_crash_now')">💥 INSTANT CRASH</button>
    <div class="card"><h3>Live Bets</h3><div id="bet-monitor">None</div></div>
    <div class="card"><h3>Create User</h3><input id="nu" placeholder="User"><input id="np" placeholder="Pass"><button style="background:#00f2ff;width:100%" onclick="addUser()">CREATE USER</button></div>
    <div class="card"><h3>User Database</h3><div id="ulist">Loading...</div></div>
    <script>
        const socket = io();
        socket.on('connect', () => socket.emit('admin_get_users'));
        function addUser() { socket.emit('admin_create_user', { u: document.getElementById('nu').value, p: document.getElementById('np').value }); document.getElementById('nu').value=""; document.getElementById('np').value=""; }
        socket.on('admin_update_bets', (bets) => { 
            const m = document.getElementById('bet-monitor'); m.innerHTML = bets.length ? "" : "No active bets";
            bets.forEach(b => m.innerHTML += `<div class="bet-row">${b.u.toUpperCase()}: $${b.amt} ${b.cashed ? '✅' : '⏳'}</div>`);
        });
        socket.on('admin_user_list', (users) => {
            const list = document.getElementById('ulist'); list.innerHTML = "";
            users.forEach(u => list.innerHTML += `<div class="user-row">
                <b>${u.username.toUpperCase()}</b><br>Pass: ${u.password}<br>Balance: $${u.balance.toFixed(2)} [${u.isBlocked ? 'BLOCKED' : 'ACTIVE'}]<br>
                <button onclick="setBal('${u.username}')" style="background:#39ff14">SET $</button>
                <button onclick="socket.emit('admin_block_user', '${u.username}')" style="background:orange">BLOCK</button>
                <button onclick="if(confirm('Delete user ${u.username}?')) socket.emit('admin_delete_user', '${u.username}')" style="background:red;color:white">DELETE</button>
            </div>`);
        });
        function setBal(u) { const amt = prompt("New total balance for " + u); if(amt) socket.emit('admin_set_balance', { u: u, amt: amt }); }
    </script>
</body>
</html>
