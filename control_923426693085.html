<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { background: #050510; color: white; font-family: sans-serif; padding: 10px; }
        .card { background: #111125; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; }
        button { padding: 8px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin: 2px; }
        .btn-crash { background: #ff0055; width: 100%; height: 60px; color: white; font-size: 1.2rem; }
        .user-row { background: #000; padding: 12px; margin: 10px 0; border-left: 4px solid #00f2ff; border-radius: 5px; font-size: 0.8rem; }
        .btn-add { background: #39ff14; color: #000; }
        .btn-minus { background: orange; color: #000; }
        .btn-copy { background: #00f2ff; color: #000; }
    </style>
</head>
<body>
    <button class="btn-crash" onclick="socket.emit('admin_crash_now')">💥 INSTANT CRASH</button>
    
    <div class="card">
        <h3>Create New Account</h3>
        <input id="nu" placeholder="Username">
        <input id="np" placeholder="Password">
        <button style="background:#00f2ff; width:100%" onclick="addUser()">CREATE USER</button>
    </div>

    <div class="card">
        <h3>Users Database</h3>
        <div id="ulist">Loading...</div>
    </div>

    <script>
        const socket = io();
        socket.on('connect', () => socket.emit('admin_get_users'));

        function addUser() {
            const u = document.getElementById('nu').value;
            const p = document.getElementById('np').value;
            socket.emit('admin_create_user', { u, p });
            document.getElementById('nu').value = ""; document.getElementById('np').value = "";
        }

        socket.on('admin_user_list', (users) => {
            const list = document.getElementById('ulist'); list.innerHTML = "";
            users.forEach(u => {
                list.innerHTML += `<div class="user-row">
                    <b>${u.username.toUpperCase()}</b> | Pass: ${u.password} <button class="btn-copy" onclick="copyAcct('${u.username}','${u.password}')">COPY</button><br>
                    Balance: <b style="color:#39ff14">$${u.balance.toFixed(2)}</b> [${u.isBlocked ? 'BLOCKED' : 'ACTIVE'}]<br><br>
                    <button class="btn-add" onclick="adjustBal('${u.username}', 'add')">+ ADD $</button>
                    <button class="btn-minus" onclick="adjustBal('${u.username}', 'minus')">- MINUS $</button>
                    <button onclick="socket.emit('admin_block_user', '${u.username}')" style="background:white">BLOCK</button>
                    <button onclick="if(confirm('Delete?')) socket.emit('admin_delete_user', '${u.username}')" style="background:red;color:white">DEL</button>
                </div>`;
            });
        });

        function adjustBal(u, type) {
            const amt = prompt(`How much to ${type} for ${u}?`);
            if(amt) socket.emit('admin_adjust_balance', { u, amt, type });
        }

        function copyAcct(u, p) {
            const txt = `Flashspeed Account\nUser: ${u}\nPass: ${p}\nLink: https://flashspeed-backend.onrender.com`;
            navigator.clipboard.writeText(txt).then(() => alert("Account copied to clipboard!"));
        }
    </script>
</body>
</html>
